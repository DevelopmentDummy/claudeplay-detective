<!-- deps: {{case_phase}} -->
<panel-actions>
[
  {
    "id": "reset_case",
    "label": "사무소로 돌아가기",
    "description": "사건을 마무리하고 일상으로 복귀한다",
    "available_when": "case_phase === 'resolved'",
    "needs_ui": false
  }
]
</panel-actions>

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :host {
    display: block;
    contain: layout style;
    overflow: hidden;
  }
  .report {
    font-family: 'Segoe UI', sans-serif;
    color: #e0ddd4;
    max-width: 380px;
    margin: 0 auto;
    padding: 20px 16px;
    background: #0d1220;
    border-radius: 8px;
    border: 1px solid #1e2a45;
    overflow: hidden;
  }

  /* Custom scrollbar */
  .report::-webkit-scrollbar { width: 5px; }
  .report::-webkit-scrollbar-track { background: #0a0e1a; }
  .report::-webkit-scrollbar-thumb { background: #1e2a45; border-radius: 3px; }
  .report::-webkit-scrollbar-thumb:hover { background: #c8a44e; }

  /* Dashed separator */
  .sep {
    border: none; border-top: 1px dashed #1e2a45;
    margin: 14px 0;
  }

  /* Header */
  .report-header {
    text-align: center;
    padding-bottom: 4px;
  }
  .report-header .border-line {
    font-family: 'Courier New', monospace;
    font-size: 11px; color: #1e2a45;
    letter-spacing: 2px;
    line-height: 1.2;
    overflow: hidden;
    white-space: nowrap;
  }
  .report-header .title {
    font-size: 18px; font-weight: 900; color: #c8a44e;
    letter-spacing: 3px; margin: 8px 0 2px;
  }
  .report-header .subtitle {
    font-size: 10px; color: #7a7a8a;
    letter-spacing: 4px; text-transform: uppercase;
    margin-bottom: 8px;
  }
  .report-header .case-name {
    font-size: 14px; font-weight: 700; color: #e0ddd4;
    margin-top: 10px;
  }
  .report-header .case-meta {
    font-size: 11px; color: #7a7a8a;
    font-family: 'Courier New', monospace;
    margin-top: 4px;
  }

  /* Section title */
  .section-title {
    font-size: 10px; font-weight: 700; color: #c8a44e;
    letter-spacing: 2px; text-transform: uppercase;
    margin-bottom: 8px;
  }

  /* Verdict section */
  .verdict-row {
    display: flex; justify-content: space-between; align-items: flex-start;
    margin-bottom: 6px;
  }
  .verdict-label {
    font-size: 11px; color: #7a7a8a;
    font-family: 'Courier New', monospace;
    flex-shrink: 0; min-width: 48px;
  }
  .verdict-value {
    font-size: 11px; color: #e0ddd4;
    text-align: right; flex: 1; margin-left: 8px;
    line-height: 1.4;
  }
  .verdict-value.culprit { color: #e74c3c; font-weight: 700; }

  /* Evidence list */
  .ev-item {
    display: flex; align-items: flex-start; gap: 6px;
    font-size: 11px; margin-bottom: 3px;
    line-height: 1.4;
  }
  .ev-item .mark { flex-shrink: 0; font-family: 'Courier New', monospace; }
  .ev-item .mark.found { color: #4ecdc4; }
  .ev-item .mark.missed { color: #e74c3c; }
  .ev-item .ev-name { flex: 1; }
  .ev-item.missed .ev-name { color: #5a5a6a; }

  /* Progress bar */
  .progress-row {
    display: flex; align-items: center; gap: 8px;
    margin-top: 8px;
  }
  .progress-label {
    font-size: 10px; color: #7a7a8a;
    font-family: 'Courier New', monospace;
    flex-shrink: 0;
  }
  .progress-track {
    flex: 1; height: 8px; background: #0a0e1a;
    border-radius: 4px; overflow: hidden;
  }
  .progress-fill {
    height: 100%; border-radius: 4px;
    transition: width 0.4s;
  }
  .progress-fill.evidence { background: linear-gradient(90deg, #4ecdc4, #2ecc71); }
  .progress-fill.deduction { background: linear-gradient(90deg, #c8a44e, #e8c86e); }
  .progress-pct {
    font-size: 10px; color: #e0ddd4; font-weight: 700;
    font-family: 'Courier New', monospace;
    flex-shrink: 0; min-width: 36px; text-align: right;
  }

  /* Deduction list */
  .ded-item {
    display: flex; align-items: flex-start; gap: 6px;
    font-size: 11px; margin-bottom: 3px;
    line-height: 1.4;
  }
  .ded-item .mark { flex-shrink: 0; font-family: 'Courier New', monospace; }
  .ded-item .mark.unlocked { color: #c8a44e; }
  .ded-item .mark.locked { color: #5a5a6a; }
  .ded-item .ded-name { flex: 1; }
  .ded-item.locked .ded-name { color: #5a5a6a; font-style: italic; }

  /* Stat rows */
  .stat-row {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 5px;
  }
  .stat-label {
    font-size: 11px; color: #7a7a8a;
  }
  .stat-value {
    font-size: 11px; color: #e0ddd4;
    font-family: 'Courier New', monospace;
    font-weight: 600;
  }
  .stat-value.good { color: #4ecdc4; }
  .stat-value.warn { color: #e8c86e; }
  .stat-value.bad { color: #e74c3c; }

  /* Rank display */
  .rank-section {
    text-align: center;
    padding: 16px 0 8px;
  }
  .rank-label {
    font-size: 10px; color: #7a7a8a;
    letter-spacing: 2px; text-transform: uppercase;
    margin-bottom: 8px;
  }
  .rank-letter {
    font-size: 64px; font-weight: 900;
    line-height: 1;
    text-shadow: 0 0 30px currentColor;
  }
  .rank-letter.S { color: #c8a44e; }
  .rank-letter.A { color: #4ecdc4; }
  .rank-letter.B { color: #4a90d9; }
  .rank-letter.C { color: #7a7a8a; }
  .rank-desc {
    font-size: 11px; margin-top: 6px;
    font-style: italic;
  }
  .rank-desc.S { color: #c8a44e; }
  .rank-desc.A { color: #4ecdc4; }
  .rank-desc.B { color: #4a90d9; }
  .rank-desc.C { color: #7a7a8a; }

  /* Return button */
  .return-btn {
    display: block; width: 100%;
    padding: 12px; margin-top: 4px;
    border: 2px solid #c8a44e; border-radius: 8px;
    background: linear-gradient(135deg, #1a2035, #0d1220);
    color: #c8a44e; font-size: 14px; font-weight: 700;
    font-family: 'Segoe UI', sans-serif;
    letter-spacing: 1px; cursor: pointer;
    transition: all 0.3s;
  }
  .return-btn:hover {
    background: linear-gradient(135deg, #c8a44e, #a8843e);
    color: #0a0e1a;
    box-shadow: 0 4px 20px rgba(200,164,78,0.3);
    transform: translateY(-1px);
  }
  .return-btn:active { transform: translateY(0); }

  /* Waiting state */
  .not-resolved {
    text-align: center; padding: 60px 20px; color: #7a7a8a;
  }
  .not-resolved .icon { font-size: 40px; margin-bottom: 12px; display: block; opacity: 0.5; }
  .not-resolved .msg { font-size: 13px; line-height: 1.6; }
</style>

<div class="report" id="reportRoot"></div>

<script>
  var d = __panelBridge.data;
  var root = shadow.getElementById('reportRoot');

  var casePhase = d.case_phase || 'idle';
  var caseData = d['case'] || {};
  var searchPoints = d['search-points'] || {};
  var cluesFound = d.clues_found || 0;
  var cluesTotal = d.clues_total || 0;
  var wrongPresents = d.wrong_presents || 0;
  var wrongPresentsMax = d.wrong_presents_max || 3;
  var insight = d.insight || 0;
  var insightMax = d.insight_max || 100;
  var trust = d.trust || 0;
  var trustMax = d.trust_max || 100;
  var day = d.day || 1;
  var time = d.time || '';
  var caseTitle = d.case_title || caseData.title || '---';

  if (casePhase !== 'resolved') {
    root.innerHTML = '<div class="not-resolved"><span class="icon">🔍</span><span class="msg">아직 사건이 해결되지 않았습니다.</span></div>';
  } else {
    render();
  }

  function render() {
    var evidence = caseData.evidence || {};
    var deductions = caseData.deductions || {};
    var suspects = caseData.suspects || [];
    var solution = caseData.solution || {};

    // Culprit name from suspects
    var culpritName = solution.culprit || '???';
    suspects.forEach(function(s) {
      if (s.id === solution.culprit) culpritName = s.name;
    });

    // Evidence lists
    var evKeys = Object.keys(evidence);
    var foundList = [];
    var missedList = [];
    evKeys.forEach(function(k) {
      var ev = evidence[k];
      if (ev.found) {
        foundList.push(ev);
      } else {
        missedList.push(ev);
      }
    });

    var evPercent = evKeys.length > 0 ? Math.round((foundList.length / evKeys.length) * 100) : 0;

    // Deductions
    var dedKeys = Object.keys(deductions);
    var dedUnlocked = [];
    var dedLocked = [];
    dedKeys.forEach(function(k) {
      var dd = deductions[k];
      if (dd.unlocked) {
        dedUnlocked.push(dd);
      } else {
        dedLocked.push(dd);
      }
    });

    var dedPercent = dedKeys.length > 0 ? Math.round((dedUnlocked.length / dedKeys.length) * 100) : 0;

    // Search points stats
    var spHits = 0;
    var spMisses = 0;
    var spRoomKeys = Object.keys(searchPoints);
    spRoomKeys.forEach(function(rk) {
      var room = searchPoints[rk];
      var points = room.points || [];
      points.forEach(function(p) {
        if (p.investigated) {
          if (p.evidence_id) {
            spHits++;
          } else {
            spMisses++;
          }
        }
      });
    });

    var spTotal = spHits + spMisses;
    var spAccuracy = spTotal > 0 ? Math.round((spHits / spTotal) * 100) : 0;

    // Calculate rank
    var rank = 'C';
    var rankDesc = '수사에 많은 아쉬움이 남는다.';
    var allDeductions = dedKeys.length > 0 && dedLocked.length === 0;

    if (evPercent === 100 && wrongPresents === 0 && allDeductions) {
      rank = 'S';
      rankDesc = '완벽한 수사. 빈틈 없는 추리.';
    } else if (evPercent >= 80 && wrongPresents <= 1) {
      rank = 'A';
      rankDesc = '우수한 수사. 뛰어난 통찰력.';
    } else if (evPercent >= 60) {
      rank = 'B';
      rankDesc = '무난한 수사. 개선의 여지가 있다.';
    } else {
      rank = 'C';
      rankDesc = '수사에 많은 아쉬움이 남는다.';
    }

    // Truncate helper
    function trunc(str, len) {
      if (!str) return '---';
      return str.length > len ? str.substring(0, len) + '...' : str;
    }

    // Build HTML
    var html = '';

    // === Header ===
    html += '<div class="report-header">';
    html += '<div class="border-line">═══════════════════════════</div>';
    html += '<div class="title">🔍 사건 수사 보고서</div>';
    html += '<div class="subtitle">Case Report</div>';
    html += '<div class="border-line">═══════════════════════════</div>';
    html += '<div class="case-name">📁 ' + caseTitle + '</div>';
    html += '<div class="case-meta">Day ' + day + ' · ' + time + ' 종료</div>';
    html += '</div>';

    html += '<hr class="sep">';

    // === Verdict ===
    html += '<div class="section-title">⚖️ 수사 결과</div>';
    html += '<div class="verdict-row"><span class="verdict-label">범인</span><span class="verdict-value culprit">' + culpritName + '</span></div>';
    html += '<div class="verdict-row"><span class="verdict-label">동기</span><span class="verdict-value">' + trunc(solution.motive, 80) + '</span></div>';
    html += '<div class="verdict-row"><span class="verdict-label">방법</span><span class="verdict-value">' + trunc(solution.method, 80) + '</span></div>';

    html += '<hr class="sep">';

    // === Evidence Collection ===
    html += '<div class="section-title">🔍 증거 수집 현황</div>';

    foundList.forEach(function(ev) {
      html += '<div class="ev-item found"><span class="mark found">✓</span><span class="ev-name">' + ev.name + '</span></div>';
    });
    missedList.forEach(function(ev) {
      html += '<div class="ev-item missed"><span class="mark missed">✗</span><span class="ev-name">' + ev.name + '</span></div>';
    });

    html += '<div class="progress-row">';
    html += '<span class="progress-label">수집률</span>';
    html += '<div class="progress-track"><div class="progress-fill evidence" style="width:' + evPercent + '%"></div></div>';
    html += '<span class="progress-pct">' + evPercent + '%</span>';
    html += '</div>';

    html += '<hr class="sep">';

    // === Deductions ===
    html += '<div class="section-title">🔗 추리 현황</div>';

    dedUnlocked.forEach(function(dd) {
      html += '<div class="ded-item unlocked"><span class="mark unlocked">✓</span><span class="ded-name">' + dd.name + '</span></div>';
    });
    dedLocked.forEach(function(dd) {
      html += '<div class="ded-item locked"><span class="mark locked">✗</span><span class="ded-name">???</span></div>';
    });

    if (dedKeys.length > 0) {
      html += '<div class="progress-row">';
      html += '<span class="progress-label">달성률</span>';
      html += '<div class="progress-track"><div class="progress-fill deduction" style="width:' + dedPercent + '%"></div></div>';
      html += '<span class="progress-pct">' + dedPercent + '%</span>';
      html += '</div>';
    }

    html += '<hr class="sep">';

    // === Efficiency Stats ===
    html += '<div class="section-title">📊 수사 효율</div>';

    var stats = d['case-stats'] || {};

    html += '<div class="stat-row"><span class="stat-label">탐색 허탕</span><span class="stat-value">' + (stats.search_misses || spMisses) + '회</span></div>';
    html += '<div class="stat-row"><span class="stat-label">탐색 적중</span><span class="stat-value">' + (stats.search_hits || spHits) + '회</span></div>';

    var accClass = spAccuracy >= 70 ? 'good' : (spAccuracy >= 40 ? 'warn' : 'bad');
    html += '<div class="stat-row"><span class="stat-label">탐색 적중률</span><span class="stat-value ' + accClass + '">' + (spTotal > 0 ? spAccuracy + '%' : '-') + '</span></div>';

    html += '<div class="stat-row"><span class="stat-label">추궁 횟수</span><span class="stat-value">' + (stats.press_count || 0) + '회</span></div>';
    html += '<div class="stat-row"><span class="stat-label">증거 제시</span><span class="stat-value">' + (stats.present_correct || 0) + '성공 / ' + (stats.present_wrong || 0) + '실패</span></div>';
    html += '<div class="stat-row"><span class="stat-label">추리 시도</span><span class="stat-value">' + (stats.deduce_success || 0) + '성공 / ' + (stats.deduce_fail || 0) + '실패</span></div>';

    html += '<div class="stat-row"><span class="stat-label">잘못된 증거 제시</span><span class="stat-value' + (wrongPresents > 0 ? ' bad' : ' good') + '">' + wrongPresents + ' / ' + wrongPresentsMax + '</span></div>';

    var insightClass = insight >= 80 ? 'good' : (insight >= 50 ? 'warn' : 'bad');
    html += '<div class="stat-row"><span class="stat-label">최종 통찰력</span><span class="stat-value ' + insightClass + '">' + insight + ' / ' + insightMax + '</span></div>';

    var trustClass = trust >= 70 ? 'good' : (trust >= 40 ? 'warn' : 'bad');
    html += '<div class="stat-row"><span class="stat-label">최종 신뢰도</span><span class="stat-value ' + trustClass + '">' + trust + ' / ' + trustMax + '</span></div>';

    html += '<hr class="sep">';

    // === Rank ===
    html += '<div class="rank-section">';
    html += '<div class="rank-label">종합 평가</div>';
    html += '<div class="rank-letter ' + rank + '">' + rank + '</div>';
    html += '<div class="rank-desc ' + rank + '">' + rankDesc + '</div>';
    html += '</div>';

    html += '<hr class="sep">';

    // === Return Button ===
    html += '<button class="return-btn" id="returnBtn">🏠 사무소로 돌아가기</button>';

    root.innerHTML = html;

    // Bind return button
    shadow.getElementById('returnBtn').addEventListener('click', async function() {
      var btn = shadow.getElementById('returnBtn');
      btn.disabled = true;
      btn.textContent = '돌아가는 중...';
      btn.style.opacity = '0.5';

      await __panelBridge.runTool('engine', { action: 'reset_case' });
      await __panelBridge.queueEvent('[사건종료]');
      __panelBridge.closeModal('사건결과');
      __panelBridge.sendMessage('*[사건을 마무리하고 사무소로 돌아간다]*');
    });
  }

  // Panel action registration
  __panelBridge.registerAction('reset_case', async function() {
    await __panelBridge.runTool('engine', { action: 'reset_case' });
    await __panelBridge.queueEvent('[사건종료]');
    __panelBridge.closeModal('사건결과');
  });
</script>
